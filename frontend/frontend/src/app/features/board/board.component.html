<div>
  <div class="breadcrumb">
    <span class="bc-link" routerLink="/summary">ProjectSphere</span>
    <span class="bc-sep mi">chevron_right</span>Board
  </div>

  <div class="page-hdr">
    <div>
      <div class="page-title">Sprint 3 Board</div>
      <div class="page-sub">Feb 1 – Feb 14, 2025 · <span class="lozenge loz-active">Active</span></div>
    </div>
    <div class="page-actions">
      <button class="btn btn-secondary" (click)="ui.toast('Epics panel')"><span class="mi">auto_awesome</span>Epics</button>
      <button class="btn btn-secondary" (click)="ui.toast('Insights panel')"><span class="mi">insights</span>Insights</button>
      <button class="btn btn-primary" (click)="ui.openCreateIssue()"><span class="mi">add</span>Create Issue</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="board-toolbar">
    <div class="jira-search">
      <span class="mi">search</span>
      <input [(ngModel)]="searchTerm" placeholder="Search board…"/>
    </div>
    <div class="avatar-filter">
      <div *ngFor="let a of assignees"
        class="av-filter"
        [class.selected]="selectedAssignee === a.name"
        [style.background]="ds.avColor(a.name)"
        [title]="a.name"
        (click)="toggleAssignee(a.name)">{{ a.initials }}</div>
    </div>
    <select class="jira-select" [(ngModel)]="filterType">
      <option value="">All Types</option>
      <option>STORY</option><option>TASK</option><option>BUG</option><option>SUBTASK</option>
    </select>
    <select class="jira-select" [(ngModel)]="filterPri">
      <option value="">All Priorities</option>
      <option>CRITICAL</option><option>HIGH</option><option>MEDIUM</option><option>LOW</option>
    </select>
    <select class="jira-select" [(ngModel)]="filterEpic">
      <option value="">All Epics</option>
      <option>Authentication</option><option>Chat System</option><option>Analytics</option><option>Defect Engine</option>
    </select>
    <button class="btn btn-secondary btn-sm" (click)="ui.toast('Group by options')">
      <span class="mi">tune</span>Group by
    </button>
  </div>

  <!-- Kanban Board -->
  <div class="kanban">
    <div *ngFor="let col of ds.COLS" class="k-col" [class.drag-over]="dragOverCol === col.id">
      <div class="k-col-hdr" [style.borderBottomColor]="col.color">
        <div class="k-col-left">
          <span class="k-col-title" [style.color]="col.text">{{ col.label }}</span>
          <span class="k-col-cnt">{{ getColTickets(col.id).length }}</span>
        </div>
        <div style="display:flex;gap:2px">
          <button class="icon-btn" (click)="ui.openCreateIssue()" title="Add issue"><span class="mi">add</span></button>
          <button class="icon-btn" (click)="ui.toast('Column options')" title="More"><span class="mi">more_horiz</span></button>
        </div>
      </div>

      <div class="k-col-body"
        (dragover)="onDragOver($event, col.id)"
        (dragleave)="onDragLeave(col.id)"
        (drop)="onDrop($event, col.id)">
        <ng-container *ngIf="getColTickets(col.id).length > 0; else empty">
          <button *ngFor="let t of getColTickets(col.id)"
            class="k-card"
            [class.dragging]="dragId === t.id"
            draggable="true"
            (dragstart)="onDragStart($event, t.id)"
            (dragend)="onDragEnd()"
            (click)="ui.openTicket(t)">
            <span class="k-card-title">{{ t.sum }}</span>
            <div class="k-card-meta">
              <div class="issue-type" [ngClass]="ds.itClass(t.type)" [title]="t.type">
                <span class="mi" style="font-size:10px">{{ ds.itIcon(t.type) }}</span>
              </div>
              <span class="mi pri-icon" [ngClass]="ds.priClass(t.pri)" [title]="t.pri + ' priority'">{{ ds.priIcon(t.pri) }}</span>
              <span class="k-card-id">{{ t.type.substring(0,1) }}-{{ t.id }}</span>
              <span class="k-card-pts" *ngIf="t.pts">{{ t.pts }}</span>
              <div *ngIf="t.ass" class="k-card-av" [style.background]="ds.avColor(t.ass)" [title]="t.ass">{{ ds.ini(t.ass) }}</div>
            </div>
          </button>
        </ng-container>
        <ng-template #empty>
          <div class="k-col-empty">
            <span class="mi">inbox</span><span>No issues</span>
          </div>
        </ng-template>
      </div>

      <button class="k-col-add" (click)="ui.openCreateIssue()">
        <span class="mi">add</span>Create issue
      </button>
    </div>

    <button class="add-col" (click)="ui.toast('Add column dialog coming soon')">
      <span class="mi">add</span>Add column
    </button>
  </div>
</div>
