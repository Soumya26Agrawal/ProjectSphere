<!-- ── PUBLIC ROUTES: landing / login (no shell) ── -->
<ng-container *ngIf="!isShellRoute">
  <router-outlet></router-outlet>
</ng-container>

<!-- ── SHELL ROUTES: all app feature pages ── -->
<ng-container *ngIf="isShellRoute">

  <!-- Top Navigation -->
  <app-topnav></app-topnav>

  <!-- Notification Slide-Over Panel -->
  <app-notification-panel
    [open]="ui.notifOpen"
    (close)="ui.closeNotif()">
  </app-notification-panel>

  <!-- Main Layout -->
  <div class="layout" [class.sidebar-closed]="!ui.sidebarOpen">
    <app-sidebar></app-sidebar>
    <main class="main">
      <router-outlet></router-outlet>
    </main>
    <div class="sidebar-backdrop" *ngIf="ui.sidebarOpen && isMobile" (click)="ui.closeSidebar()"></div>
  </div>

  <!-- Global Dialogs -->
  <app-ticket-detail
    [ticket]="ui.selectedTicket"
    (close)="ui.closeTicket()"
    (ticketDeleted)="ui.closeTicket()">
  </app-ticket-detail>

  <app-create-issue
    [open]="ui.createIssueOpen"
    (close)="ui.closeCreateIssue()"
    (created)="ui.closeCreateIssue()">
  </app-create-issue>

  <app-report-defect
    [open]="ui.reportDefectOpen"
    (close)="ui.closeReportDefect()">
  </app-report-defect>

  <!-- Toast Notification -->
  <div class="toast" [class.show]="ui.toastVisible">{{ ui.toastMessage }}</div>

</ng-container>
