<div class="ax-breadcrumb">
  <a routerLink="/admin">Admin</a>
  <span class="mi">chevron_right</span>
  <a routerLink="/admin/projects">Projects</a>
  <span class="mi">chevron_right</span>
  <span *ngIf="project">{{ prjTag(project.projectId) }}</span>
</div>

<div class="ax-page-head">
  <div>
    <h1 class="ax-page-title" *ngIf="project">{{ project.projectName }}</h1>
    <h1 class="ax-page-title" *ngIf="!project">Project</h1>
    <p class="ax-page-sub" *ngIf="project">Project ID: {{ prjTag(project.projectId) }} · Status: {{ project.status }}</p>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="ax-btn ghost" (click)="back()"><span class="mi">arrow_back</span> Back</button>
  </div>
</div>

<div class="ax-info" *ngIf="loading">Loading project…</div>
<div class="ax-err" *ngIf="error"><span class="mi">error_outline</span> {{ error }}</div>

<section class="ax-section" *ngIf="!loading && !error && project">
  <h3 class="ax-section-title"><span class="mi">edit</span> Edit Project Details</h3>

  <form [formGroup]="form" (ngSubmit)="save()" novalidate class="ax-form">
    <label class="ax-field span2"><span>Project Name</span>
      <input type="text" formControlName="projectName" /></label>
    <label class="ax-field span2"><span>Description</span>
      <textarea formControlName="description" rows="4"></textarea></label>
    <label class="ax-field"><span>Status</span>
      <select formControlName="status">
        <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
      </select></label>
    <label class="ax-field"><span>Domain</span>
      <select formControlName="domain">
        <option *ngFor="let d of domainOptions" [value]="d">{{ d }}</option>
      </select></label>
    <label class="ax-field span2"><span>Project Manager</span>
      <select formControlName="managerId">
        <option [ngValue]="null">— None —</option>
        <option *ngFor="let m of managers" [ngValue]="m.userId">
          {{ m.firstName }} {{ m.lastName }} ({{ m.email }})
        </option>
      </select>
    </label>

    <div class="ax-form-foot">
      <button type="button" class="ax-btn ghost" (click)="back()">Cancel</button>
      <button type="submit" class="ax-btn primary" [disabled]="saving">
        <span class="mi" *ngIf="!saving">save</span>
        <span class="mi spin" *ngIf="saving">sync</span>
        {{ saving ? 'Saving…' : 'Save Changes' }}
      </button>
    </div>
  </form>

  <div class="ax-ok"  *ngIf="message"><span class="mi">check_circle</span> {{ message }}</div>
</section>
