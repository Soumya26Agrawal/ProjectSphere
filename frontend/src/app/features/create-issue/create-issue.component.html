<div class="overlay" [class.open]="open" (click)="onOverlayClick($event)">
  <div class="dialog form-dialog">
    <div class="dialog-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="form-head-icon"><span class="mi">add_task</span></span>
        <div>
          <h2 style="margin:0">Create Issue</h2>
          <small style="color:var(--text3);font-size:12px">
            <ng-container *ngIf="project">{{ project.projectName }} · </ng-container>
            Reporter · {{ reporterName }}
          </small>
        </div>
      </div>
      <button class="icon-btn" (click)="close.emit()"><span class="mi">close</span></button>
    </div>

    <div class="dialog-body">
      <div *ngIf="loading" style="padding:14px;color:var(--text3);font-size:13px">Loading project…</div>
      <div *ngIf="errorMsg" style="padding:10px;background:#FFEBE6;border:1px solid #FFBDAD;border-radius:6px;color:#BF2600;font-size:12px;margin-bottom:12px">{{ errorMsg }}</div>

      <ng-container *ngIf="!loading && project">
        <div class="form-row">
          <div class="form-field">
            <label>Issue Type <span style="color:#DE350B;font-weight:700">*</span></label>
            <div class="form-input">
              <select [(ngModel)]="form.type" name="type" (ngModelChange)="onTypeChange()">
                <option value="EPIC">Epic</option>
                <option value="USER_STORY">User Story</option>
                <option value="TASK">Task</option>
                <option value="SUB_TASK">Sub-task</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label>Status</label>
            <div class="form-input">
              <select [(ngModel)]="form.status" name="status">
                <option value="TO_DO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="REVIEW">In Review</option>
                <option value="COMPLETED">Done</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-field">
          <label>Summary <span style="color:#DE350B;font-weight:700">*</span></label>
          <div class="form-input">
            <input [(ngModel)]="form.title" name="title" required #titleRef="ngModel" placeholder="Brief summary of the issue…"/>
          </div>
          <div *ngIf="titleRef.invalid && titleRef.touched" style="color:#DE350B;font-size:12px;margin-top:4px">Summary is required.</div>
        </div>

        <div class="form-field">
          <label>Description</label>
          <div class="form-input">
            <textarea [(ngModel)]="form.description" name="description" rows="3" placeholder="Add more detail…"></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Assignee</label>
            <div class="form-input">
              <select [(ngModel)]="form.assigneeId" name="assignee">
                <option [ngValue]="null">Unassigned</option>
                <option *ngFor="let m of teamMembers" [ngValue]="m.userId">{{ fullName(m) }}</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label>Story Points</label>
            <div class="form-input">
              <input [(ngModel)]="form.storyPoints" name="storyPoints" type="number" placeholder="e.g. 5" min="1" max="100"/>
            </div>
          </div>
        </div>

        <div class="form-row" *ngIf="form.type !== 'EPIC'">
          <div class="form-field">
            <label>Sprint</label>
            <div class="form-input">
              <select [(ngModel)]="form.sprintId" name="sprint">
                <option [ngValue]="null">Backlog</option>
                <option *ngFor="let s of sprints" [ngValue]="s.sprintId">
                  {{ s.sprintName }}<span *ngIf="s.status === 'ACTIVE'"> (active)</span>
                </option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label>{{ parentLabel }}</label>
            <div class="form-input">
              <select [(ngModel)]="form.parentId" name="parent">
                <option [ngValue]="null">None</option>
                <option *ngFor="let p of availableParents" [ngValue]="p.ticketId">
                  PS-{{ p.ticketId }} · {{ p.title }}
                </option>
              </select>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-secondary" (click)="close.emit()">Cancel</button>
      <button class="btn btn-primary" (click)="submit()" [disabled]="loading || !project">
        <span class="mi">add</span>Create Issue
      </button>
    </div>
  </div>
</div>
