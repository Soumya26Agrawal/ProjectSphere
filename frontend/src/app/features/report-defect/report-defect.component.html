<div class="overlay" [class.open]="open" (click)="onOverlayClick($event)">
  <div class="dialog form-dialog rd-dialog">
    <div class="dialog-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="form-head-icon red"><span class="mi">bug_report</span></span>
        <div>
          <h2 style="margin:0">Report Defect</h2>
          <small style="color:var(--text3);font-size:12px">Link defect to a ticket and test case, then describe the issue.</small>
        </div>
      </div>
      <button class="icon-btn" (click)="close.emit()"><span class="mi">close</span></button>
    </div>

    <div class="dialog-body">
      <!-- ═══ Ticket & Test Case Selection ═══ -->
      <div class="form-row">
        <div class="form-field">
          <label>Ticket <span style="color:#DE350B;font-weight:700" aria-hidden="true">*</span></label>
          <div class="form-input">
            <select [(ngModel)]="form.ticketId" name="ticketId">
              <option [ngValue]="0">Select an unmapped ticket...</option>
              <option *ngFor="let ticket of unmappedTickets" [ngValue]="ticket">
                Ticket #{{ ticket }}
              </option>
            </select>
          </div>
        </div>
        <div class="form-field">
          <label>Test Case <span style="color:#DE350B;font-weight:700" aria-hidden="true">*</span></label>
          <div class="form-input">
            <select [(ngModel)]="form.testCaseId" name="testCaseId">
              <option [ngValue]="0">Select an unmapped test case...</option>
              <option *ngFor="let tc of unmappedTestCases" [ngValue]="tc">
                TC-{{ tc }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- ═══ Severity & Reproducibility ═══ -->
      <div class="form-row">
        <div class="form-field">
          <label>Severity <span style="color:#DE350B;font-weight:700" aria-hidden="true">*</span></label>
          <div class="form-input">
            <select [(ngModel)]="form.severity" name="severity">
              <option *ngFor="let sev of severityOptions" [value]="sev">{{ sev }}</option>
            </select>
          </div>
        </div>
        <div class="form-field">
          <label>Reproducibility <span style="color:#DE350B;font-weight:700" aria-hidden="true">*</span></label>
          <div class="form-input">
            <select [(ngModel)]="form.reproducible" name="reproducible">
              <option *ngFor="let rep of reproducibilityOptions" [value]="rep">{{ rep }}</option>
            </select>
          </div>
        </div>
      </div>

      <!-- ═══ Steps to Reproduce ═══ -->
      <div class="form-field">
        <label>Steps to Reproduce <span style="color:#DE350B;font-weight:700" aria-hidden="true">*</span></label>
        <div class="steps-container">
          <!-- <div class="step-item" *ngFor="let step of form.steps; let i = index"> -->
            <div class="step-item"
     *ngFor="let step of form.steps; let i = index; trackBy: trackByIndex">
            <span class="step-number">{{ i + 1 }}</span>
            <input 
              type="text" 
              [(ngModel)]="form.steps[i]" 
              [name]="'step-' + i"
              placeholder="Describe what the user does..."
              class="step-input"
            />
            <button 
              *ngIf="form.steps.length > 1" 
              type="button" 
              class="step-remove"
              (click)="removeStep(i)"
              title="Remove step">
              <span class="mi">close</span>
            </button>
          </div>
          <button type="button" class="btn btn-secondary" (click)="addStep()" style="align-self: flex-start;">
            <span class="mi">add</span>Add Step
          </button>
        </div>
      </div>

      <!-- ═══ Attachments ═══ -->
      <div class="form-field">
        <label>Attachments</label>
        <label class="rd-upload">
          <span class="mi">cloud_upload</span>
          <span>Click to attach screenshots or logs</span>
          <input type="file" multiple hidden (change)="onFilesSelected($event)"/>
        </label>
        <div class="rd-attach-list" *ngIf="attachments.length > 0">
          <div class="rd-attach" *ngFor="let a of attachments; let i = index">
            <span class="mi">insert_drive_file</span>
            <div class="rd-attach-body">
              <strong>{{ a.name }}</strong>
              <small>{{ a.size }}</small>
            </div>
            <button type="button" class="rd-attach-remove" (click)="removeAttachment(i)">
              <span class="mi">close</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-secondary" (click)="close.emit()" [disabled]="isSubmitting">Cancel</button>
      <button class="btn btn-primary" (click)="submit()" [disabled]="isSubmitting || isLoadingData">
        <span class="mi">bug_report</span>{{ isSubmitting ? 'Submitting...' : 'Report Defect' }}
      </button>
    </div>
  </div>
</div>
