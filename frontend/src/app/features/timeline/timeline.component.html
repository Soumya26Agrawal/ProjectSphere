<div>
  <div class="breadcrumb">
    <span class="bc-link" routerLink="/board">ProjectSphere</span>
    <span class="bc-sep mi">chevron_right</span>Timeline
  </div>

  <div class="page-hdr">
    <div>
      <div class="page-title">Timeline</div>
      <div class="page-sub">Sprint and story Gantt view</div>
    </div>
    <div class="page-actions">
      <div class="seg">
        <button class="seg-btn" (click)="ui.toast('Week view')">Week</button>
        <button class="seg-btn active">Month</button>
        <button class="seg-btn" (click)="ui.toast('Quarter view')">Quarter</button>
      </div>
      <button class="btn btn-secondary btn-sm" (click)="ui.toast('Today')">
        <span class="mi">today</span>Today
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <div class="jira-search">
      <span class="mi">search</span>
      <input placeholder="Search sprints / stories…" style="width:200px"/>
    </div>
    <select class="jira-select">
      <option>All Assignees</option><option>Arjun Kumar</option>
      <option>Priya Sharma</option><option>Ravi Patel</option>
    </select>
    <select class="jira-select">
      <option>All Epics</option><option>Authentication</option>
      <option>Chat System</option><option>Analytics</option><option>Defect Engine</option>
    </select>
    <select class="jira-select">
      <option>Status Category</option><option>To Do</option>
      <option>In Progress</option><option>Done</option>
    </select>
  </div>

  <!-- Gantt -->
  <div class="tl-container">
    <!-- Header row -->
    <div class="tl-head">
      <div class="tl-work-hd">Work</div>
      <div class="tl-months">
        <div class="tl-month-hd" *ngFor="let m of months">{{ m }} 2025</div>
      </div>
    </div>

    <!-- Sprint + story rows -->
    <ng-container *ngFor="let sp of tlSprints">
      <!-- Sprint row -->
      <div class="tl-row">
        <div class="tl-lbl sprint-lbl" (click)="ui.toast(sp.name + ' details')">
          <span class="mi" style="font-size:14px;color:var(--jira-blue)">sprint</span>
          {{ sp.name }}
        </div>
        <div class="tl-cell">
          <div class="tl-bar tl-sprint-bar"
            [style.left]="pct(sp.s)"
            [style.width]="pct(sp.e - sp.s)">
            {{ sp.name }}
          </div>
          <div class="tl-today-line" [style.left]="todayPct">
            <div class="tl-today-label">Today</div>
          </div>
        </div>
      </div>

      <!-- Story rows -->
      <div class="tl-row" *ngFor="let st of sp.stories">
        <div class="tl-lbl story-lbl" (click)="ui.toast('Story details')">
          <div class="tl-epic-dot" [style.background]="st.color"></div>
          {{ st.title }}
        </div>
        <div class="tl-cell">
          <div class="tl-bar"
            [style.left]="pct(st.s)"
            [style.width]="pct(st.e - st.s)"
            [style.background]="st.color + '18'"
            [style.borderColor]="st.color + '50'"
            [style.color]="st.color">
            {{ st.title }}
          </div>
          <div class="tl-today-line" [style.left]="todayPct"></div>
        </div>
      </div>
    </ng-container>
  </div>
</div>
