<div class="notif-panel" [class.open]="open">
  <div class="notif-hdr">
    <h3>Notifications</h3>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn btn-sm btn-secondary" (click)="ui.markAllRead()">Mark all read</button>
      <button class="icon-btn" (click)="close.emit()"><span class="mi">close</span></button>
    </div>
  </div>

  <div class="notif-list">
    <div
      class="notif-item"
      [class.unread]="!n.read"
      *ngFor="let n of ui.notifications"
      (click)="ui.readNotif(n.id)">
      <div class="notif-icon" [ngClass]="n.ic">
        <span class="mi">{{ n.icon }}</span>
      </div>
      <div class="notif-text">
        <div class="notif-title">{{ n.title }}</div>
        <div class="notif-desc">{{ n.desc }}</div>
        <div class="notif-time">{{ n.time }}</div>
      </div>
      <div class="notif-dot" *ngIf="!n.read"></div>
    </div>
  </div>
</div>
