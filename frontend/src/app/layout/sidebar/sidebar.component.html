<aside class="sidebar">
  <div class="sb-section">
    <div class="sb-title">Planning</div>
    <button class="sb-item" routerLink="/summary" routerLinkActive="active">
      <span class="mi">home</span>Summary
    </button>
    <button class="sb-item" routerLink="/board" routerLinkActive="active">
      <span class="mi">view_kanban</span>Board
      <span class="sb-count">{{ boardCount }}</span>
    </button>
    <button class="sb-item" routerLink="/backlog" routerLinkActive="active">
      <span class="mi">view_list</span>Backlog
      <span class="sb-count">{{ backlogCount }}</span>
    </button>
    <button class="sb-item" routerLink="/timeline" routerLinkActive="active">
      <span class="mi">timeline</span>Timeline
    </button>
  </div>

  <div class="sb-section">
    <div class="sb-title">Tracking</div>
    <button class="sb-item" routerLink="/defects" routerLinkActive="active">
      <span class="mi">bug_report</span>Defects
      <span class="sb-count">{{ defectCount }}</span>
    </button>
    <button class="sb-item" routerLink="/history" routerLinkActive="active">
      <span class="mi">history</span>Sprint History
    </button>
    <button class="sb-item" routerLink="/analytics" routerLinkActive="active">
      <span class="mi">bar_chart</span>Analytics
    </button>
  </div>

  <div class="sb-section">
    <div class="sb-title">People</div>
    <button class="sb-item" routerLink="/team" routerLinkActive="active">
      <span class="mi">group</span>Team Info
    </button>
  </div>

  <div class="sb-divider"></div>
  <button class="sb-item" routerLink="/settings" routerLinkActive="active">
    <span class="mi">settings</span>Project Settings
  </button>
  <button class="sb-item" routerLink="/reports" routerLinkActive="active">
    <span class="mi">assessment</span>Reports
  </button>
  <button class="sb-item" routerLink="/releases" routerLinkActive="active">
    <span class="mi">rocket_launch</span>Releases
  </button>
</aside>
