<!-- Top bar — identical structure to admin-shell and pm-shell -->
<header class="ax-topbar">
  <a class="ax-brand" routerLink="/board">
    <span class="ax-logo">
      <span class="mi">dashboard</span>
    </span>
    <span class="ax-brand-name">Project Sphere</span>
  </a>

  <div class="ax-search-top">
    <span class="mi">search</span>
    <input type="text" [(ngModel)]="query"
           placeholder="Search tickets, defects, team members..." />
  </div>

  <div class="ax-topbar-right">
    <button class="ax-avatar-btn" (click)="toggleMenu(); $event.stopPropagation()" aria-label="Profile">
      <span class="ax-avatar">{{ currentUser()?.avatar || 'U' }}</span>
    </button>

    <div class="ax-menu" *ngIf="menuOpen">
      <div class="ax-menu-head">
        <div class="ax-avatar lg">{{ currentUser()?.avatar || 'U' }}</div>
        <div class="ax-menu-info">
          <div class="ax-menu-name">{{ currentUser()?.name || 'User' }}</div>
          <div class="ax-menu-mail">{{ currentUser()?.email || '' }}</div>
        </div>
      </div>
      <button class="ax-menu-btn" (click)="logout()">
        <span class="mi">logout</span> Logout
      </button>
    </div>
  </div>
</header>

<div class="ax-shade" *ngIf="menuOpen" (click)="closeMenu()"></div>
