<div class="page-wrapper">
  <!-- BACKGROUND EFFECTS -->
  <div class="bg-grid-pattern"></div>
  <div class="blur-blob top-blob"></div>
  <div class="blur-blob bottom-blob"></div>

  <!-- NAVBAR -->
<nav class="navbar" >
  <div class="nav-container">
    <!-- Logo -->
    <div class="brand" routerLink="/">
      <div class="logo-icon">
        <svg class="spin-slow" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>
        </svg>
      </div>
      <span class="brand-text">
        Project<span class="text-gradient">Sphere</span>
      </span>
    </div>

    <!-- Empty menu space to maintain layout if needed, though without button -->
    <div class="menu">
    </div>
  </div>
</nav>


  <div class="login-container">
    <div class="login-card">
      <div class="card-header">
        <div class="brand">
          <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        </div>
        <h2>Welcome back</h2>
        <p>Enter your details to access your account</p>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            placeholder="name@company.com"
            required
          >
        </div>

        <div class="form-group">
          <div class="password-header">
            <label for="password">Password</label>
            <a href="#" class="forgot-password" (click)="$event.preventDefault()">Forgot password?</a>
          </div>
          <div class="password-input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="password"
              placeholder="Enter your password"
              required
            >
            <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
            </button>
          </div>
        </div>

        <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Logging in...' : 'Log in' }}
        </button>
      </form>

      <div class="card-footer">
        
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <app-landing-footer></app-landing-footer>
</div>
