<div class="card" *ngIf="project" [ngClass]="project.status === 'COMPLETED' ? 'card-completed' : 'card-active'">
  <div class="card-header">
    <div class="header-badges">
      <span class="badge-id">PRJ-{{ project.projectId }}</span>
      <span class="badge-status" [ngClass]="project.status === 'COMPLETED' ? 'status-completed' : 'status-active'">
        <span *ngIf="project.status === 'ONGOING'">Active</span>
        <span *ngIf="project.status === 'COMPLETED'">Completed</span>
      </span>
    </div>
    <button mat-icon-button class="more-btn" style="border: none; background: transparent; cursor: pointer;">
      <mat-icon style="color: #64748b;">more_vert</mat-icon>
    </button>
  </div>

  <div class="card-body">
    <h2 class="project-title">{{ project.projectName }}</h2>
    <p class="project-desc">{{ project.description }}</p>
  </div>

  <div class="card-progress">
    <div class="progress-header">
      <span class="manager-name">{{ project.manager.name }}</span>
      <span class="progress-text">{{ project.progress }}%</span>
    </div>
    <div class="progress-bar">
      <div 
        class="progress-fill" 
        [ngClass]="project.status === 'COMPLETED' ? 'fill-completed' : 'fill-active'"
        [style.width]="project.progress + '%'">
      </div>
    </div>
  </div>

  <div class="card-footer">
    <div class="date-info" style="display: flex; align-items: center; gap: 4px; color: #64748b;">
      <mat-icon style="font-size: 16px; width: 16px; height: 16px;">event</mat-icon>
      <span style="font-size: 12px; margin-top: 1px;">{{ project.targetDate }}</span>
    </div>
    
    <div class="team-avatars">
      <div class="avatar" *ngFor="let member of project.team" [ngClass]="member.bg">
        {{ member.initials }}
      </div>
      <div class="avatar avatar-extra" *ngIf="project.extraTeamCount > 0">
        +{{ project.extraTeamCount }}
      </div>
    </div>
  </div>
</div>
