<div class="advanced-filters">
  <h3>Detailed Filters</h3>
  
  <div class="filters-grid">
    <!-- Domain Selection -->
    <div class="filter-group custom-dropdown-wrap">
      <label>Domain Group</label>
      <button class="dropdown-btn" (click)="toggleDomain()">
        <span *ngIf="selectedDomains.length === 0">Select Domain...</span>
        <span *ngIf="selectedDomains.length > 0">{{selectedDomains.length}} Selected</span>
      </button>
      <div class="dropdown-box" *ngIf="isDomainOpen">
        <input type="text" [(ngModel)]="domainSearch" placeholder="Search domain..." class="dropdown-search">
        <div class="options-list">
          <div *ngFor="let d of domains">
            <label class="option-label" *ngIf="d.toLowerCase().includes(domainSearch.toLowerCase())">
              <input type="checkbox" [checked]="selectedDomains.includes(d)" (change)="toggleDomainSelection(d, $event)">
              {{d}}
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Manager Selection -->
    <div class="filter-group custom-dropdown-wrap">
      <label>Project Manager</label>
      <button class="dropdown-btn" (click)="toggleManager()">
        <span *ngIf="selectedManagers.length === 0">Select Manager...</span>
        <span *ngIf="selectedManagers.length > 0">{{selectedManagers.length}} Selected</span>
      </button>
      <div class="dropdown-box" *ngIf="isManagerOpen">
        <input type="text" [(ngModel)]="managerSearch" placeholder="Search manager..." class="dropdown-search">
        <div class="options-list">
          <div *ngFor="let m of managers">
            <label class="option-label" *ngIf="m.toLowerCase().includes(managerSearch.toLowerCase())">
              <input type="checkbox" [checked]="selectedManagers.includes(m)" (change)="toggleManagerSelection(m, $event)">
              {{m}}
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Team Members Selection -->
    <div class="filter-group custom-dropdown-wrap">
      <label>Team Members</label>
      <button class="dropdown-btn" (click)="toggleTeamMember()">
        <span *ngIf="selectedTeamMembers.length === 0">Select Team Member...</span>
        <span *ngIf="selectedTeamMembers.length > 0">{{selectedTeamMembers.length}} Selected</span>
      </button>
      <div class="dropdown-box" *ngIf="isTeamMemberOpen">
        <input type="text" [(ngModel)]="teamMemberSearch" placeholder="Search member..." class="dropdown-search">
        <div class="options-list">
          <div *ngFor="let tm of teamMembers">
            <label class="option-label" *ngIf="tm.toLowerCase().includes(teamMemberSearch.toLowerCase())">
              <input type="checkbox" [checked]="selectedTeamMembers.includes(tm)" (change)="toggleTeamMemberSelection(tm, $event)">
              {{tm}}
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline Context & Dates -->
    <div class="filter-group">
      <label>Timeline Context</label>
      <select [(ngModel)]="timelineContext" (ngModelChange)="applyFilters()" class="simple-select">
        <option value="">Any</option>
        <option value="Active">Active</option>
        <option value="Started">Started</option>
        <option value="Deadline">Deadline</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Date (Applicable for Context)</label>
      <input type="date" [(ngModel)]="selectedDate" (ngModelChange)="applyFilters()" class="simple-input">
      <span class="hint" *ngIf="selectedDate && timelineContext">Filtering projects strictly for this context/date point</span>
    </div>

    <!-- Health / Progress Bar -->
    <div class="filter-group">
        <label>Health (Progress minimum >= {{progressStatus}}%)</label>
        <div class="range-sliders">
            <input type="range" class="single-slider" min="0" max="100" [(ngModel)]="progressStatus" (ngModelChange)="applyFilters()">
        </div>
    </div>

    <div class="filter-group clear-actions">
        <button class="btn-clear" (click)="clearFilters()">Clear All Filters</button>
    </div>
  </div>
</div>
